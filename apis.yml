aid: prodigi
url: https://raw.githubusercontent.com/api-evangelist/prodigi/refs/heads/main/apis.yml
name: Prodigi
kind: company
description: Prodigi is a global print-on-demand and dropshipping platform that connects
  merchants to a worldwide network of print labs. The Prodigi Print API (v4.0) lets
  developers create and manage print orders, fetch real-time quotes, and query the
  product catalogue, with print and shipping fulfilled at wholesale prices direct
  from the manufacturer.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Print on Demand
- Printing
- Dropshipping
- Fulfillment
- E-commerce
created: '2026-06-25'
modified: '2026-06-25'
specificationVersion: '0.19'
apis:
- aid: prodigi:prodigi-orders-api
  name: Prodigi Orders API
  tags:
  - Orders
  - Fulfillment
  - Print on Demand
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
