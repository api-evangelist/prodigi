    type: Documentation
  - url: https://www.prodigi.com/print-api/docs/reference/
    type: APIReference
  - url: openapi/prodigi-openapi.yml
    type: OpenAPI
  - url: collections/prodigi.postman_collection.json
    type: PostmanCollection
  - url: collections/prodigi.opencollection.json
    type: OpenCollection
  description: Create, retrieve, and list print orders, and run order actions - cancel,
    update shipping method, update recipient, and update metadata - across Prodigi's
    global print-on-demand fulfillment network.
